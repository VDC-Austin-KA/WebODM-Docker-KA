services:
  db:
    image: postgis/postgis:13-3.1-alpine
    container_name: webodm_db
    environment:
      POSTGRES_DB: webodm_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webodm_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  broker:
    image: redis:7.0.10-alpine
    container_name: webodm_broker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  webapp:
    image: opendronemap/webodm_webapp:latest
    container_name: webodm_webapp
    command: >
      /bin/bash -c "
        echo 'Waiting for database to be fully ready...'
        until python -c 'import psycopg2; psycopg2.connect(host=\"db\", port=5432, dbname=\"webodm_dev\", user=\"postgres\", password=\"postgres\")' 2>/dev/null; do
          echo 'DB not ready yet, retrying in 3s...'
          sleep 3
        done
        echo 'Database is ready!'
        ./start.sh
      "
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
    volumes:
      - ./data/media:/webodm/app/media
    ports:
      - "8080:8000"
    environment:
      - WO_DATABASE_HOST=db
      - WO_DATABASE_NAME=webodm_dev
      - WO_DATABASE_USER=postgres
      - WO_DATABASE_PASSWORD=postgres
      - WO_BROKER=redis://broker:6379
      - WO_PORT=8000
      - WO_HOST=0.0.0.0
      - WO_DEBUG=NO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    image: opendronemap/webodm_webapp:latest
    container_name: webodm_worker
    command: >
      /bin/bash -c "
        echo 'Waiting for database to be fully ready...'
        until python -c 'import psycopg2; psycopg2.connect(host=\"db\", port=5432, dbname=\"webodm_dev\", user=\"postgres\", password=\"postgres\")' 2>/dev/null; do
          echo 'DB not ready yet, retrying in 3s...'
          sleep 3
        done
        echo 'Database is ready!'
        ./worker.sh start
      "
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
    volumes:
      - ./data/media:/webodm/app/media
    environment:
      - WO_DATABASE_HOST=db
      - WO_DATABASE_NAME=webodm_dev
      - WO_DATABASE_USER=postgres
      - WO_DATABASE_PASSWORD=postgres
      - WO_BROKER=redis://broker:6379
    restart: unless-stopped

networks:
  default:
    name: webodm_network
